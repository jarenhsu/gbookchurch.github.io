<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教會小本本 | 基督教反骨 Podcast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    
    <style>
        body { background-color: #050505; color: white; cursor: none; overflow-x: hidden; font-family: sans-serif; }
        #cursor {
            width: 20px; height: 20px; background: white; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: difference;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s ease;
        }
        .glass-card:hover { border-color: rgba(220, 38, 38, 0.4); background: rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at 50% 50%, #1a0b0b 0%, #050505 100%); }
        iframe { border-radius: 1rem; }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <section class="h-screen w-full flex flex-col items-center justify-center relative hero-gradient px-6">
        <div class="absolute w-[600px] h-[600px] bg-red-900/10 rounded-full blur-[150px] -z-10 animate-pulse"></div>
        
        <div class="text-center">
            <h1 id="title" class="text-6xl md:text-9xl font-black tracking-tighter mb-6 opacity-0 translate-y-20">
                教會小本本
            </h1>
            <p id="subtitle" class="text-gray-500 tracking-[0.8em] uppercase text-xs md:text-sm opacity-0">
                The Unspoken Truth of Faith
            </p>
        </div>

        <div class="absolute bottom-12 text-gray-700 text-xs tracking-widest uppercase animate-bounce">
            Scroll to Explore
        </div>
    </section>

    <section class="min-h-screen py-32 px-6 max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
        <div class="reveal">
            <h2 class="text-4xl font-bold mb-8">用愛心與誠實，<br><span class="text-red-600">說出心裡話。</span></h2>
            <p class="text-gray-400 text-lg leading-relaxed mb-10">
                聊聊教會「不喜歡」人家談的事情。從身心健康到信仰反思，這不是一本乖乖牌的筆記，這是屬於你的「小本本」。
            </p>
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/show/5D00R8zG6J8N8fK8U8X8U8?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        
        <div class="glass-card p-4 rounded-3xl reveal">
            <div class="aspect-video w-full overflow-hidden rounded-2xl">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/videoseries?list=PL9d9t6kvVqkviKMqcGZwes8a_1qUFIqJg" title="YouTube playlist" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
            <p class="mt-4 text-center text-sm text-gray-500">最新影片清單</p>
        </div>
    </section>

    <section class="py-32 px-6 flex justify-center reveal">
        <div class="glass-card p-16 rounded-[4rem] text-center max-w-3xl relative overflow-hidden group">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-red-600/20 rounded-full blur-3xl group-hover:bg-red-600/40 transition-all duration-700"></div>
            
            <span class="text-xs tracking-[0.4em] text-red-500 font-bold uppercase">Personality Test</span>
            <h2 class="text-5xl font-bold mt-6 mb-8">MBTI 信仰人格測驗</h2>
            <p class="text-gray-400 mb-12 text-xl leading-relaxed">
                想知道你在聖經中代表哪個角色嗎？<br>透過 12 個問題直擊你的信仰靈魂。
            </p>
            <a href="https://portaly.cc/gbookchurch" target="_blank" class="inline-block px-12 py-5 bg-white text-black rounded-full font-black text-lg hover:scale-105 transition-transform shadow-[0_0_40px_rgba(255,255,255,0.2)]">
                開始測驗
            </a>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/5">
        <div class="flex justify-center gap-8 mb-8 opacity-50">
            <a href="#" class="hover:text-red-500 transition-colors">Instagram</a>
            <a href="#" class="hover:text-red-500 transition-colors">Facebook</a>
            <a href="#" class="hover:text-red-500 transition-colors">Line</a>
        </div>
        <p class="text-gray-600 text-xs tracking-widest">&copy; 2026 教會小本本. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        // 1. Lenis Smooth Scroll
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // 2. Cursor
        const cursor = document.querySelector('#cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.4, ease: "power2.out" });
        });

        // 3. Entry Animations
        const tl = gsap.timeline();
        tl.to("#title", { opacity: 1, y: 0, duration: 1.8, ease: "expo.out" })
          .to("#subtitle", { opacity: 1, duration: 1.2, letterSpacing: "1.2em" }, "-=1");

        // 4. Scroll Reveal
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll('.reveal').forEach((el) => {
            gsap.from(el, {
                scrollTrigger: { trigger: el, start: "top 85%" },
                opacity: 0, y: 60, duration: 1.2, ease: "power3.out"
            });
        });
    </script>
</body>
</html>
