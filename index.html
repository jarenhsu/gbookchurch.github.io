<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教會小本本 | 基督教反骨 Podcast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    
    <style>
        :root { --primary-orange: #FF7A32; --primary-green: #88B04B; --bg-light: #FDFBF7; }
        body { background-color: var(--bg-light); color: #333; cursor: none; overflow-x: hidden; font-family: 'PingFang TC', sans-serif; }
        #cursor { width: 35px; height: 35px; border: 3px solid var(--primary-green); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; background: rgba(136, 176, 75, 0.1); transition: transform 0.1s ease; }
        .blob { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: -1; animation: float 20s infinite alternate; }
        @keyframes float { from { transform: translate(-5%, -5%) rotate(0deg); } to { transform: translate(10%, 15%) rotate(20deg); } }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 2px solid #fff; box-shadow: 0 30px 60px rgba(0,0,0,0.03); border-radius: 40px; }
        .btn-vibrant { background: var(--primary-orange); color: white; box-shadow: 0 10px 25px rgba(255, 122, 50, 0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .btn-vibrant:hover { transform: scale(1.08) rotate(2deg); }
        .text-gradient { background: linear-gradient(to right, var(--primary-orange), var(--primary-green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-green); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="blob" style="background-color: var(--primary-orange); top: -10%; left: -5%;"></div>
    <div class="blob" style="background-color: var(--primary-green); bottom: -10%; right: -5%; animation-delay: -7s;"></div>

    <section class="h-screen w-full flex flex-col items-center justify-center relative px-6 text-center">
        <div id="hero-content">
            <div class="inline-block px-6 py-2 bg-green-100 text-green-700 rounded-full text-xs font-black mb-8 tracking-[0.3em] uppercase animate-pulse">Ep. 100+ Available</div>
            <h1 class="text-7xl md:text-[9rem] font-black tracking-tighter mb-6 text-gradient leading-none">教會小本本</h1>
            <p class="text-xl md:text-3xl font-bold text-gray-400 max-w-2xl mx-auto leading-relaxed italic">🤘 誠實說出那些被教會消音的心裡話</p>
        </div>
        <div class="mt-20 flex gap-4">
            <div class="w-4 h-4 bg-orange-400 rounded-full animate-bounce"></div>
            <div class="w-4 h-4 bg-green-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-4 h-4 bg-orange-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
    </section>

    <section class="py-24 px-6 max-w-[1400px] mx-auto">
        <div class="flex flex-col gap-6 mb-12 reveal">
            <h2 class="text-5xl md:text-6xl font-black">豐富節目庫</h2>
            <div class="h-2 w-32 bg-orange-500 rounded-full"></div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-8 glass-card p-6 md:p-8 reveal">
                <div class="aspect-video w-full overflow-hidden rounded-[30px] shadow-2xl">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/videoseries?list=PL9d9t6kvVqkviKMqcGZwes8a_1qUFIqJg" title="Main Player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
                <div class="mt-8">
                    <h3 class="text-2xl font-bold mb-4 text-orange-600">最新集數即時看</h3>
                    <p class="text-gray-500 font-medium">我們不說教，我們只說真心話。在這裡，你可以找到所有關於身心健康、信仰反思與人生故事的精彩集數。</p>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-6 reveal" style="transition-delay: 0.2s">
                <div class="glass-card p-8 bg-green-50/50 border-green-100">
                    <h4 class="text-xl font-black mb-4 text-green-700 italic">精選專題</h4>
                    <ul class="flex flex-col gap-4 text-gray-600 font-bold">
                        <li class="flex items-center gap-3"><span class="w-2 h-2 bg-orange-400 rounded-full"></span> MBTI 聖經人格解析</li>
                        <li class="flex items-center gap-3"><span class="w-2 h-2 bg-orange-400 rounded-full"></span> 牧師也會進精神病院？</li>
                        <li class="flex items-center gap-3"><span class="w-2 h-2 bg-orange-400 rounded-full"></span> 離婚故事與信仰衝突</li>
                        <li class="flex items-center gap-3"><span class="w-2 h-2 bg-orange-400 rounded-full"></span> 本本讀書會系列</li>
                    </ul>
                </div>

                <div class="glass-card p-4">
                    <div class="aspect-[4/3] rounded-3xl overflow-hidden shadow-lg">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/videoseries?list=PL9d9t6kvVqkviKMqcGZwes8a_1qUFIqJg&index=2" frameborder="0"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-32 px-6 flex justify-center reveal">
        <div class="glass-card p-16 md:p-24 text-center max-w-4xl relative overflow-hidden bg-white/60">
            <div class="text-7xl mb-10">📖</div>
            <h2 class="text-5xl md:text-7xl font-black mb-10 italic text-gray-800 tracking-tight">你是哪位聖經人物？</h2>
            <p class="text-gray-500 text-2xl mb-14 max-w-2xl mx-auto font-medium leading-relaxed">12 題測驗，直擊你的信仰靈魂。<br>找出最像你的聖經導師！</p>
            <a href="https://portaly.cc/gbookchurch" target="_blank" class="btn-vibrant inline-block px-16 py-6 rounded-full text-white font-black text-2xl tracking-widest">立即開測 🚀</a>
        </div>
    </section>

    <footer class="py-24 text-center">
        <div class="flex flex-wrap justify-center gap-6 md:gap-12 mb-12 text-lg">
            <a href="https://www.instagram.com/gbookchurch/" target="_blank" class="text-orange-500 font-black hover:scale-110 transition-transform tracking-widest">INSTAGRAM</a>
            <a href="https://portaly.cc/gbookchurch" target="_blank" class="text-green-600 font-black hover:scale-110 transition-transform tracking-widest">LINE 貼圖</a>
            <a href="https://portaly.cc/gbookchurch" target="_blank" class="text-gray-400 font-black hover:scale-110 transition-transform tracking-widest">贊助支持</a>
        </div>
        <div class="w-20 h-1 bg-gray-200 mx-auto mb-10 rounded-full"></div>
        <p class="text-xs text-gray-300 font-black tracking-[0.6em]">KEEP IT REAL • KEEP IT FAITHFUL</p>
    </footer>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        const cursor = document.querySelector('#cursor');
        window.addEventListener('mousemove', (e) => { gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.4, ease: "power2.out" }); });
        gsap.registerPlugin(ScrollTrigger);
        gsap.from("#hero-content", { opacity: 0, scale: 0.9, duration: 2, ease: "expo.out" });
        document.querySelectorAll('.reveal').forEach((el) => { gsap.from(el, { scrollTrigger: { trigger: el, start: "top 90%" }, opacity: 0, y: 80, duration: 1.2, ease: "power3.out" }); });
    </script>
</body>
</html>
